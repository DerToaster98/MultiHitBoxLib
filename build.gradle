plugins {
	id 'fabric-loom' version '1.3-SNAPSHOT'
	id 'maven-publish'
}

version = project.modVersion
group = project.mavenFroup

base {
	archivesName = project.modName
}

repositories {
    // Azurelib
    maven { url 'https://libs.azuredoom.com:4443/mods' }
	
    // GeckoLib
    maven { url 'https://dl.cloudsmith.io/public/geckolib3/geckolib/maven' }

    // CurseForge
    maven { url 'https://www.cursemaven.com' }
	
	// java repo to get databuddy from
	maven { url "https://cubicinterpolation.net/maven/" }
}

dependencies {
	minecraft "com.mojang:minecraft:${project.mcVersion}"
    mappings loom.officialMojangMappings()
	modImplementation "net.fabricmc:fabric-loader:${project.loaderVersion}"
	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabricVersion}"
	// AzureLib
	modImplementation "mod.azure.azurelib:azurelib-fabric-${project.azurelibVersion}"
	// GeckoLib
	modImplementation "software.bernie.geckolib:geckolib-fabric-${project.geckolibVersion}"
	// Databuddy
	modCompileOnly "commoble.databuddy:${databuddy_branch}:${databuddy_version}"
	include "commoble.databuddy:${databuddy_branch}:${databuddy_version}"
}

processResources {
	inputs.property "version", project.version

	filesMatching("fabric.mod.json") {
		expand "version": project.version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 17
}

java {
	withSourcesJar()

	sourceCompatibility = JavaVersion.VERSION_17
	targetCompatibility = JavaVersion.VERSION_17
}

jar {
	from("LICENSE") {
		rename { "${it}_${project.base.archivesName.get()}"}
	}
}

publishing {
	publications {
		mavenJava(MavenPublication) {
			from components.java
		}
	}

	// See https://docs.gradle.org/current/userguide/publishing_maven.html for information on how to set up publishing.
	repositories {
	}
}